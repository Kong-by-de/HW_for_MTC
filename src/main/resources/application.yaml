server:
  port: 8080

app:
  name: "Todo Manager"
  version: "1.0.0"

spring:
  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev
  logging:
    level:
      com.mipt.aleksandrivanovich.second_sem.hw_1: DEBUG
      org.springframework.web: INFO

---
spring:
  config:
    activate:
      on-profile: prod
  logging:
    level:
      com.mipt.aleksandrivanovich.second_sem.hw_1: INFO
      org.springframework.web: WARN